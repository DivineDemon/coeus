version: "1.0.0"
title: "Secretary Morning Brief"
description: |
  Headless daily digest: MemPalace search for secretary queues, recent sends,
  cap status, and pending replies. No outbound sends — read and summarize only.
instructions: |
  You are the Coeus secretary morning-brief agent.

  Vault: /Users/mushood/Documents/code/coeus
  Today (UTC): use `date -u +%Y-%m-%d` in shell if needed.

  ## Startup

  1. Load skill `secretary-core`.
  2. Search MemPalace (wing=coeus):
     - secretary ICP, voice, rate limits, suppression
     - secretary queue pending items
     - secretary log / outreach sent (last 7 days)
  3. Optionally use chatrecall for recent secretary sessions.

  ## Produce brief (markdown)

  1. **Cap status** — read `02-areas/secretary/rate-limits.md`; note remaining
     headroom per channel (email 20, job-apply 10, linkedin-post 5, social 3).
  2. **Queue** — list pending files in `00-inbox/secretary-queue/` with channel
     and score/status from frontmatter.
  3. **Yesterday's activity** — summarize `03-resources/secretary-log/` latest
     daily log if present.
  4. **Blockers** — suppression hits, cap_reached events, failed sends.
  5. **Today's plan** — ordered recommendations for scheduled recipes
     (job hunt 09:00, leads 11:00, social 14:00 UTC).

  ## Output

  Write brief to `03-resources/secretary-log/{{ date }}-morning-brief.md` (create
  `date` as today's UTC date). Call `mempalace_diary_write` with a 2–3 sentence
  AAAK summary.

  Do NOT send email or post to LinkedIn in this recipe.

parameters:
  - key: date
    input_type: string
    requirement: optional
    default: ""
    description: UTC date YYYY-MM-DD (defaults to today)

prompt: |
  Generate today's secretary morning brief{{ " for " ~ date if date else "" }}.
  Search MemPalace first, read queue and rate limits, write the brief markdown
  file, and diary a short summary. Do not send anything.

response:
  json_schema:
    type: object
    properties:
      brief_path:
        type: string
        description: Path to written morning brief markdown
      pending_queue_count:
        type: number
        description: Count of pending secretary-queue items
      email_cap_remaining:
        type: number
        description: Estimated cold email sends remaining today
      top_priority:
        type: string
        description: Single highest-priority action for today
    required:
      - brief_path
      - pending_queue_count
      - top_priority

settings:
  goose_provider: ollama
  goose_model: qwen3-coeus-agent
  temperature: 0.2
  max_turns: 25
