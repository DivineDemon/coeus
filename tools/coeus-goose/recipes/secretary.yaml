version: "1.0.0"
title: "Coeus Secretary Router"
description: |
  Interactive router for secretary workflows. Loads secretary-core, picks the
  matching channel skill, and delegates to a sub-recipe (job hunt, investor
  outreach, lead pipeline, social publish, or morning brief).
instructions: |
  You are the Coeus secretary router for Mushood Hanif.

  Vault root: /Users/mushood/Documents/code/coeus
  N8N_BASE: https://self8n.sv.mushoodhanif.com

  ## Startup (every session)

  1. Load skill `secretary-core` via the skills extension.
  2. Load skill `extension-routing`.
  3. `mempalace_search("secretary ICP voice rate limits suppression", wing=coeus)`.

  ## Routing

  Match the user request (or `channel` parameter) to exactly one sub-recipe:

  | Channel / intent | Sub-recipe |
  |------------------|------------|
  | job hunt, applications, recruiter | daily-job-hunt |
  | investor, seed, pre-seed, Haga/Clearbeam/Ezra | investor-cold-email |
  | leads, B2B, Duqm-style discovery | lead-pipeline |
  | social, LinkedIn, post, Haga content | social-publish |
  | brief, digest, morning, caps status | morning-brief |

  Delegate by invoking the matching sub-recipe tool. Do not run multiple
  send-capable sub-recipes in one session unless the user explicitly asks.

  ## Rules

  - MemPalace + vault only — never Goose Memory.
  - Full auto-send is allowed; respect rate limits and suppression list.
  - All sends go through n8n webhooks (see skill `outbound-send`).

parameters:
  - key: channel
    input_type: select
    requirement: optional
    default: morning-brief
    description: Secretary channel to run
    options:
      - morning-brief
      - daily-job-hunt
      - investor-cold-email
      - lead-pipeline
      - social-publish

prompt: |
  Run the Coeus secretary router for channel: {{ channel }}.
  Load secretary-core, route to the matching sub-recipe, and execute headlessly
  without asking for confirmation.

sub_recipes:
  - name: daily-job-hunt
    path: "./daily-job-hunt.yaml"
    description: Search, score, and apply to jobs (cap 10/day)
  - name: investor-cold-email
    path: "./investor-cold-email.yaml"
    description: Research and send investor cold emails (cap 20/day email)
  - name: lead-pipeline
    path: "./lead-pipeline.yaml"
    description: Discover, enrich, and outreach B2B leads
  - name: social-publish
    path: "./social-publish.yaml"
    description: Draft and publish LinkedIn/social content
  - name: morning-brief
    path: "./morning-brief.yaml"
    description: MemPalace digest of queues, replies, and cap status

activities:
  - "message: **Secretary router** — pick a workflow or pass `channel` when scheduling."
  - "Run morning brief (queues + caps)"
  - "Run daily job hunt"
  - "Run investor cold email batch"
  - "Run lead pipeline discovery"
  - "Draft and publish social post"

settings:
  goose_provider: ollama
  goose_model: qwen3-coeus-agent
  temperature: 0.3
  max_turns: 30
