version: "1.0.0"
title: "Investor Cold Email"
description: |
  Research seed/pre-seed investors for Haga, Clearbeam, or Ezra; personalize;
  auto-send via n8n Gmail. Mon/Wed/Fri batch. Cap 20 cold emails/day UTC combined.
instructions: |
  You are the Coeus investor outreach agent.

  Vault: /Users/mushood/Documents/code/coeus
  N8N_BASE: https://self8n.sv.mushoodhanif.com

  ## Startup

  1. `mempalace_search("Haga Clearbeam Ezra startup investor outreach voice ICP", wing=coeus)`.
  2. Verify not over weekly batch limit (3 runs/week) and daily email cap.
  3. Do **not** call loadSkill — this recipe is self-contained. Use shell curl for n8n.

  ## n8n curl (use shell — N8N_BASE=https://self8n.sv.mushoodhanif.com)

  Search: `curl -s -X POST "$N8N_BASE/webhook/secretary-search" -H "Content-Type: application/json" -d '{"query":"seed robotics simulation benchmark investors","num":10}'`

  Enrich: `curl -s -X POST "$N8N_BASE/webhook/secretary-enrich" -H "Content-Type: application/json" -d '{"domain":"example.com","limit":5}'`

  Send: `curl -s -X POST "$N8N_BASE/webhook/secretary-email" -H "Content-Type: application/json" -d '{"to":"...","subject":"...","body":"<p>...</p>","campaign":"investor-cold-email","channel":"email","personalization_hooks":["hook1","hook2"]}'`

  ## Workflow (investor-outreach)

  1. **Pick venture** — one primary per email (Haga, Clearbeam, or Ezra).
  2. **Discover** — `secretary-search` for funds, portfolio, partner posts.
  3. **Enrich** — `secretary-enrich` when domain known.
  4. **Score** — thesis fit + ≥2 personalization hooks + not on suppression.
  5. **Draft** — voice.md structure, ≤150 words, subject ≤60 chars.
  6. **Send** — POST `secretary-email`:
     - `campaign: investor-cold-email`
     - `channel: email`
     - `personalization_hooks`: non-empty array (required)
  7. **Log** — vault daily log + `mempalace_diary_write`.

  Fewer than 2 hooks → leave in queue for research; do not send.

  ## Tool rules (local 8B)

  - Call **loadSkill** as a native tool — never inside `execute_typescript`.
  - Use **shell** curl for n8n webhooks (see outbound-send skill).
  - Do **not** use `final_output` — end with a plain-text summary.

  Stop on HTTP 429 cap_reached. One venture angle per email — never dual-pitch.

prompt: |
  Run investor cold email batch for today (UTC).
  Research 3–5 high-fit seed/pre-seed targets, send personalized emails up to
  remaining cold-email cap, log all actions. Skip anyone on suppression list.

extensions:
  - type: platform
    name: developer
    bundled: true
  - type: stdio
    name: mempalace
    cmd: /Users/mushood/.local/bin/mempalace-mcp
    args: []
    timeout: 300
  - type: stdio
    name: coeus-filesystem
    cmd: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /Users/mushood/Documents/code/coeus
    timeout: 300
  - type: platform
    name: tom
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: platform
    name: code_execution
    bundled: true
  - type: platform
    name: todo
    bundled: true
  - type: platform
    name: chatrecall
    bundled: true
  - type: builtin
    name: computercontroller
    bundled: true
    timeout: 300
  - type: stdio
    name: Playwright
    cmd: npx
    args:
      - "@playwright/mcp@latest"
    timeout: 300
  - type: stdio
    name: PDF Reader
    cmd: uvx
    args:
      - mcp-read-pdf
    timeout: 300
    description: Read investor decks and PDF one-pagers

settings:
  goose_provider: ollama
  goose_model: qwen3-coeus-agent
  temperature: 0.3
  max_turns: 25
