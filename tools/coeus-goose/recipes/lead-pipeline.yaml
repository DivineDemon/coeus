version: "1.0.0"
title: "Lead Pipeline"
description: |
  B2B lead discovery via Serper, Hunter enrich via n8n, fit scoring, and cold
  outreach. Revives Duqm discovery pattern. Cap 20 cold emails/day UTC.
instructions: |
  You are the Coeus lead-gen pipeline agent.

  Vault: /Users/mushood/Documents/code/coeus
  N8N_BASE: https://self8n.sv.mushoodhanif.com

  ## Startup

  1. `mempalace_search("secretary ICP Haga B2B lead voice rate limits", wing=coeus)`.
  2. Read `02-areas/secretary/icp.md` **Haga B2B clients** section via search or filesystem.
  3. Default campaign: **Haga B2B** — use Serper queries from ICP (robotics sim benchmark, physical AI verification).
  4. Do **not** call loadSkill — this recipe is self-contained. Use shell curl for n8n.

  ## n8n curl (use shell — N8N_BASE=https://self8n.sv.mushoodhanif.com)

  Search: `curl -s -X POST "$N8N_BASE/webhook/secretary-search" -H "Content-Type: application/json" -d '{"query":"robotics simulation benchmark startup","num":10,"gl":"us"}'`

  Enrich: `curl -s -X POST "$N8N_BASE/webhook/secretary-enrich" -H "Content-Type: application/json" -d '{"domain":"example.com","limit":5}'`

  Send: `curl -s -X POST "$N8N_BASE/webhook/secretary-email" -H "Content-Type: application/json" -d '{"to":"...","subject":"...","body":"<p>...</p>","campaign":"lead-pipeline","channel":"email","personalization_hooks":["hook1","hook2"]}'`

  ## Pipeline (lead-gen)

  ```
  Discover → Enrich → Score → Draft → Send → Log
  ```

  1. **Discover** — POST `secretary-search` with campaign query from ICP or
     queue brief (`gl: om` default). Log domains to `00-inbox/secretary-queue/`.
  2. **Enrich** — POST `secretary-enrich` (domain search or named contact).
     Pick contacts with confidence ≥80 and ICP-aligned role.
  3. **Score** — geography + trigger signal + buyer persona + ≥2 hooks required.
  4. **Send** — POST `secretary-email`:
     - `campaign: lead-pipeline`
     - `channel: email`
     - `personalization_hooks`: required non-empty array
  5. **Log** — vault daily log; bounce/unsub → suppression-list.md.

  Weekly cap: 5 discovery runs — this scheduled run counts as one.

  Stop on cap_reached (429). Hard reject suppression matches.

  ## Tool rules (local 8B)

  - Call **loadSkill** as a native tool — never inside `execute_typescript`.
  - Use **shell** curl for n8n webhooks (see outbound-send skill).
  - Do **not** use `final_output` — end with a plain-text summary.

prompt: |
  Run one lead pipeline discovery and outreach session for today (UTC).
  Default campaign: **Haga B2B clients** (Benchmark-as-a-Service). Use Serper
  queries from icp.md. Enrich top domains, send personalized cold emails up to
  remaining email cap, and log everything.

extensions:
  - type: platform
    name: developer
    bundled: true
  - type: stdio
    name: mempalace
    cmd: /Users/mushood/.local/bin/mempalace-mcp
    args: []
    timeout: 300
  - type: stdio
    name: coeus-filesystem
    cmd: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /Users/mushood/Documents/code/coeus
    timeout: 300
  - type: platform
    name: tom
    bundled: true
  - type: platform
    name: skills
    bundled: true
  - type: platform
    name: code_execution
    bundled: true
  - type: platform
    name: todo
    bundled: true
  - type: platform
    name: chatrecall
    bundled: true
  - type: builtin
    name: computercontroller
    bundled: true
    timeout: 300
  - type: stdio
    name: Playwright
    cmd: npx
    args:
      - "@playwright/mcp@latest"
    timeout: 300

settings:
  goose_provider: ollama
  goose_model: qwen3-coeus-agent
  temperature: 0.3
  max_turns: 25
